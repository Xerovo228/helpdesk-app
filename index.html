<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk | ИИ-маршрутизация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f0f2f5);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            padding: 15px;
            margin: 0;
        }
        
        .container {
            background: var(--bg-color);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h2 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 22px;
            display: flex;
            flex-direction: column;
        }
        
        label {
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 15px;
            padding-left: 4px;
        }
        
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--secondary-bg);
            border-radius: 12px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            transition: border-color 0.2s;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--button-color);
        }
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            opacity: 0.6;
            transform: none;
        }
        
        #submitBtn {
            background-color: var(--button-color);
            color: var(--button-text);
            margin-top: 10px;
        }
        
        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border: 2px dashed var(--button-color);
            border-radius: 15px;
            background-color: rgba(36, 129, 204, 0.05);
            color: var(--button-color);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .file-upload-label:active {
            background-color: rgba(36, 129, 204, 0.1);
            transform: scale(0.98);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .ticket-card, .user-ticket-item, .blocked-card {
            background: var(--secondary-bg);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 15px;
        }
        
        .user-ticket-item {
            border-left: 5px solid var(--button-color);
        }
        
        .blocked-card {
            border-left: 4px solid #dc3545;
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .btn-view, .btn-done, .btn-take, .btn-block, .btn-unblock {
            padding: 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }
        
        .btn-view {
            background-color: #e9ecef;
            color: #495057;
        }
        
        .btn-done {
            background-color: #d1e7dd;
            color: #0f5132;
        }
        
        .btn-take {
            background-color: var(--button-color);
            color: white;
        }
        
        .btn-block {
            background-color: #dc3545;
            color: white;
        }
        
        .btn-unblock {
            background-color: #28a745;
            color: white;
        }
        
        .admin-stats {
            background-color: var(--secondary-bg);
            padding: 10px 15px;
            border-radius: 15px;
            display: inline-block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .admin-tab, .filter-btn {
            width: auto;
            padding: 10px 20px;
            border-radius: 25px;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            font-size: 14px;
            font-weight: 600;
            border: none;
        }
        
        .admin-tab-active, .filter-btn-active {
            background-color: var(--button-color) !important;
            color: white !important;
        }
        
        .admin-tab {
            border-radius: 25px 25px 0 0;
        }
        
        .ai-diagnostic {
            background: #d4e6f1;
            padding: 10px;
            border-radius: 12px;
            margin: 10px 0;
            border-left: 4px solid var(--button-color);
        }
        
        .ai-diagnostic-title {
            font-size: 12px;
            color: #2c5282;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .ai-diagnostic-text {
            color: #1a365d;
        }
        
        .btn-debug {
            background: transparent;
            color: var(--tg-theme-hint-color, #999);
            font-size: 12px;
            padding: 5px;
            width: auto;
        }
        
        #blockModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        #blockModal > div {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 20px;
            width: 80%;
            max-width: 300px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-new { background: #ff4d4f; color: white; }
        .status-work { background: #faad14; color: white; }
        .status-done { background: #52c41a; color: white; }
        
        #statusMessage {
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="roleSwitcher" style="display:none; text-align: right; margin-bottom: 12px;">
            <button onclick="toggleRole()" class="btn-debug">🔄 Сменить роль</button>
        </div>

        <!-- СТУДЕНТ -->
        <div id="studentView">
            <div class="header">
                <h2>Создать заявку 🛠</h2>
            </div>
            <form id="ticketForm">
                <div class="form-group">
                    <label>🚪 Кабинет</label>
                    <input type="text" id="room" placeholder="Например: 305" required>
                </div>
                <div class="form-group">
                    <label>⚠️ Что случилось?</label>
                    <textarea id="problem" rows="3" placeholder="Опишите проблему..." required></textarea>
                </div>
                <div class="form-group">
                    <label class="file-upload-label" for="photo">
                        <span id="fileName">📸 Прикрепить фото</span>
                    </label>
                    <input type="file" id="photo" accept="image/*">
                </div>
                <button type="submit" id="submitBtn">Отправить</button>
            </form>

            <div id="userTickets" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h3 style="font-size: 16px; margin-bottom: 15px;">Мои заявки 📋</h3>
                <div id="userTicketsList">
                    <p style="font-size: 13px; color: var(--tg-theme-hint-color);">Загрузка заявок...</p>
                </div>
            </div>
        </div>

        <!-- АДМИН -->
        <div id="adminView" style="display:none;">
            <div class="header">
                <h2>Панель админа 👨‍💻</h2>
                <div id="adminStats" class="admin-stats">
                    📊 Загрузка статистики...
                </div>
            </div>

            <div style="display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #ddd; flex-wrap: wrap;">
                <button id="tabTicketsBtn" onclick="showAdminTab('tickets')" class="admin-tab admin-tab-active">📋 Заявки</button>
                <button id="tabBlockedBtn" onclick="showAdminTab('blocked')" class="admin-tab">🚫 Заблокированные</button>
            </div>

            <div id="ticketsTab" style="display: block;">
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;">
                    <button id="filterAllBtn" onclick="filterAll()" class="filter-btn filter-btn-active">📋 Все</button>
                    <button id="filterITBtn" onclick="filterIT()" class="filter-btn">💻 IT</button>
                    <button id="filterAHCHBtn" onclick="filterAHCH()" class="filter-btn">🔧 АХЧ</button>
                    <button id="filterNetworkBtn" onclick="filterNetwork()" class="filter-btn">🌐 Сеть</button>
                </div>
                <div id="ticketsList">
                    <p style="text-align:center;">🔄 Загрузка списка...</p>
                </div>
            </div>

            <div id="blockedTab" style="display: none;">
                <div id="blockedList">
                    <p style="text-align:center;">🔄 Загрузка списка заблокированных...</p>
                </div>
            </div>
        </div>

        <div id="statusMessage"></div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО БЛОКИРОВКИ -->
    <div id="blockModal">
        <div>
            <h3 style="margin: 0 0 10px 0;">🚫 Блокировка</h3>
            <p id="blockUserName" style="font-size: 14px; color: gray; margin: 5px 0;"></p>
            <textarea id="blockReason" rows="3" placeholder="Введите причину блокировки..." style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ccc; margin: 10px 0; box-sizing: border-box;"></textarea>
            <input type="hidden" id="blockUserId" value="">
            <input type="hidden" id="blockUserDisplayName" value="">
            <div style="display: flex; gap: 10px;">
                <button onclick="closeBlockModal()" style="flex: 1; background: gray; color: white; border: none; border-radius: 25px; padding: 10px; cursor: pointer;">Отмена</button>
                <button onclick="confirmBlock()" style="flex: 1; background: #dc3545; color: white; border: none; border-radius: 25px; padding: 10px; cursor: pointer;">Заблокировать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
