<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="roleSwitcher" style="display:none; text-align: right; margin-bottom: 12px;">
            <button onclick="toggleRole()" class="btn-debug">Сменить роль</button>
        </div>

        <div id="studentView">
            <div class="header">
                <h2>Создать заявку 🛠</h2>
            </div>
            <form id="ticketForm">
                <div class="form-group">
                    <label>🚪 Кабинет</label>
                    <input type="text" id="room" placeholder="Например: 305" required>
                </div>
                <div class="form-group">
                    <label>⚠️ Что случилось?</label>
                    <textarea id="problem" rows="3" placeholder="Опишите проблему..." required></textarea>
                </div>
                <div class="form-group">
                    <label class="file-upload-label" for="photo">
                        <span id="fileName">📸 Прикрепить фото</span>
                    </label>
                    <input type="file" id="photo" accept="image/*" required>
                </div>
                <button type="submit" id="submitBtn">Отправить</button>
            </form>

            <div id="userTickets" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                <h3 style="font-size: 16px; margin-bottom: 15px;">Мои заявки 📋</h3>
                <div id="userTicketsList">
                    <p style="font-size: 13px; color: var(--tg-theme-hint-color);">Загрузка заявок...</p>
                </div>
            </div>
        </div>

        <div id="adminView" style="display:none;">
            <div class="header">
                <h2>Панель админа 👨‍💻</h2>
                <div id="adminStats" class="admin-stats">
                    📊 Загрузка статистики...
                </div>
            </div>

            <div style="display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #ddd; flex-wrap: wrap;">
                <button id="tabTicketsBtn" onclick="showAdminTab('tickets')" class="admin-tab admin-tab-active">📋 Заявки</button>
                <button id="tabBlockedBtn" onclick="showAdminTab('blocked')" class="admin-tab">🚫 Заблокированные</button>
            </div>

            <div id="ticketsTab" style="display: block;">
                <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;">
                    <button id="filterAllBtn" onclick="filterAll()" class="filter-btn filter-btn-active">📋 Все</button>
                    <button id="filterITBtn" onclick="filterIT()" class="filter-btn">💻 IT</button>
                    <button id="filterAHCHBtn" onclick="filterAHCH()" class="filter-btn">🔧 АХЧ</button>
                    <button id="filterNetworkBtn" onclick="filterNetwork()" class="filter-btn">🌐 Сеть</button>
                </div>
                <div id="ticketsList">
                    <p style="text-align:center;">🔄 Загрузка списка...</p>
                </div>
            </div>

            <div id="blockedTab" style="display: none;">
                <div id="blockedList">
                    <p style="text-align:center;">🔄 Загрузка списка заблокированных...</p>
                </div>
            </div>
        </div>

        <div id="statusMessage" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <!-- Модальное окно с скрытыми полями -->
    <div id="blockModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: var(--tg-theme-bg-color, white); border-radius: 20px; padding: 20px; width: 80%; max-width: 300px;">
            <h3 style="margin: 0 0 10px 0; color: var(--tg-theme-text-color, #222);">🚫 Блокировка</h3>
            <p id="blockUserName" style="font-size: 14px; color: gray; margin: 5px 0;"></p>
            <textarea id="blockReason" rows="3" placeholder="Введите причину блокировки..." style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ccc; margin: 10px 0; box-sizing: border-box; font-family: inherit; font-size: 14px;"></textarea>
            
            <!-- Скрытые поля для хранения данных -->
            <input type="hidden" id="blockUserId" value="">
            <input type="hidden" id="blockUserDisplayName" value="">
            
            <div style="display: flex; gap: 10px;">
                <button onclick="closeBlockModal()" style="flex: 1; background: gray; color: white; border: none; border-radius: 25px; padding: 10px;">Отмена</button>
                <button onclick="confirmBlock()" style="flex: 1; background: #dc3545; color: white; border: none; border-radius: 25px; padding: 10px;">Заблокировать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
